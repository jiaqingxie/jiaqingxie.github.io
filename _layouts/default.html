<!DOCTYPE html>
<html lang="en">
<head>

  {% include google_analytics.html %}

  <meta charset="utf-8">
  <title>{{ site.data.main_info.name }}{% if page.title != "Home" %} | {{ page.title }}{% endif %}</title>
  <meta name="description" content="{{ site.data.main_info.name }} — AI for Science Research">
  <meta name="author" content="{{ site.data.main_info.name }}">
  <meta property="og:title" content="{{ site.data.main_info.name }}" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://jiaqingxie.github.io" />
  <meta property="og:site_name" content="{{ site.data.main_info.name }}" />
  <link rel="canonical" href="https://jiaqingxie.github.io" />

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Jost:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href={{ "/libs/external/skeleton/normalize.css" | prepend: site.baseurl }}>
  <link rel="stylesheet" href={{ "/libs/external/skeleton/skeleton.css" | prepend: site.baseurl }}>
  <link rel="stylesheet" href={{ "/libs/external/font-awesome-4.7.0/css/font-awesome.min.css" | prepend: site.baseurl }}>
  <link rel="stylesheet" href={{ "/libs/external/academicons-1.8.6/css/academicons.min.css" | prepend: site.baseurl }}>
  <link rel="stylesheet" href={{ "/libs/custom/my_css.css" | prepend: site.baseurl }}>

  <script src={{ "/libs/external/jquery-3.1.1.min.js" | prepend: site.baseurl }}></script>
  <script src={{ "/libs/custom/my_js.js" | prepend: site.baseurl }}></script>

  <link rel="icon" type="image/png" href={{ "/libs/icon.png" | prepend: site.baseurl }}>
  <link rel="shortcut icon" type="image/png" href={{ "/libs/icon.png" | prepend: site.baseurl }}>

</head>
<body>

  <header class="site-header">
    <div class="site-header-inner">
      <a class="site-title" href="{{ site.baseurl }}/">{{ site.data.main_info.name }}</a>
      <nav class="site-nav">
        <a href="{{ site.baseurl }}/#about">About</a>
        <a href="{{ site.baseurl }}/#vita">Vita</a>
        <a href="{{ site.baseurl }}/#publications">Publications</a>
        <a href="{{ site.baseurl }}/blog/">Blog</a>
        <a href="{{ site.baseurl }}/#personal-info">Personal</a>
      </nav>
      <div class="site-social">
        <a href="mailto:godxie.steven@gmail.com" aria-label="Email"><i class="fa fa-envelope"></i></a>
        <a href="{{ site.data.main_info.google_scholar }}" target="_blank" rel="noopener" aria-label="Google Scholar"><i class="ai ai-google-scholar"></i></a>
        <a href="{{ site.data.main_info.github }}" target="_blank" rel="noopener" aria-label="GitHub"><i class="fa fa-github"></i></a>
        <a href="{{ site.data.main_info.twitter }}" target="_blank" rel="noopener" aria-label="Twitter"><i class="fa fa-twitter"></i></a>
        <a href="{{ site.data.main_info.linkedin }}" target="_blank" rel="noopener" aria-label="LinkedIn"><i class="fa fa-linkedin"></i></a>
      </div>
    </div>
  </header>

  <main class="page-content{% if page.home %} page-home{% endif %}">
    {{ content }}
  </main>

  <footer class="site-footer">
    <p class="site-footer-name">{{ site.data.main_info.name }}</p>
    <p class="site-footer-links">
      <a href="mailto:godxie.steven@gmail.com">Email</a> ·
      <a href="{{ site.data.main_info.google_scholar }}" target="_blank" rel="noopener">Google Scholar</a> ·
      <a href="{{ site.baseurl }}{{ site.data.main_info.cv }}" target="_blank" rel="noopener">CV</a> ·
      <a href="{{ site.data.main_info.github }}" target="_blank" rel="noopener">GitHub</a> ·
      <a href="{{ site.data.main_info.twitter }}" target="_blank" rel="noopener">Twitter</a> ·
      <a href="{{ site.data.main_info.linkedin }}" target="_blank" rel="noopener">LinkedIn</a>
    </p>
  </footer>

  <span id="62cd7b7da1aff3196fdc26b60e396df9"></span>

</body>
</html>
